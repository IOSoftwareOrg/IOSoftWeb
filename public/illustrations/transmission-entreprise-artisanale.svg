<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="trans-illus-title trans-illus-desc">
  <title id="trans-illus-title">Remise d'une clé entre deux mains</title>
  <desc id="trans-illus-desc">Une clé dorée passée d'une main à une autre, représentant la transmission d'une entreprise artisanale à ses héritiers.</desc>
  <defs>
    <filter id="trans-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1830" flood-opacity="0.35" />
    </filter>
    <filter id="trans-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <circle cx="240" cy="100" r="110" fill="#c9a84c" opacity="0.15" filter="url(#trans-glow)" />

  <g filter="url(#trans-shadow)">
    <rect x="40" y="20" width="400" height="160" rx="16" fill="#ffffff" />
  </g>

  <ellipse cx="145" cy="112" rx="38" ry="26" fill="#1e3a5f" />
  <circle cx="178" cy="100" r="13" fill="#1e3a5f" />

  <ellipse cx="335" cy="112" rx="38" ry="26" fill="#1e3a5f" />
  <circle cx="302" cy="100" r="13" fill="#1e3a5f" />

  <circle cx="240" cy="98" r="16" fill="none" stroke="#c9a84c" stroke-width="5" />
  <line x1="240" y1="114" x2="240" y2="143" stroke="#c9a84c" stroke-width="5" stroke-linecap="round" />
  <line x1="240" y1="133" x2="250" y2="133" stroke="#c9a84c" stroke-width="5" stroke-linecap="round" />
  <line x1="240" y1="143" x2="248" y2="143" stroke="#c9a84c" stroke-width="5" stroke-linecap="round" />
</svg>
