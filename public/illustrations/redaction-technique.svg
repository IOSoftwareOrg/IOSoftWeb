<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="doc-illus-title doc-illus-desc" font-family="system-ui, sans-serif">
  <title id="doc-illus-title">Document technique structuré, bilingue français/anglais</title>
  <desc id="doc-illus-desc">Un document avec un titre, une table des matières à quatre sections numérotées et deux badges de langue français et anglais, représentant une documentation technique bilingue.</desc>
  <defs>
    <filter id="doc-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0a1830" flood-opacity="0.4" />
    </filter>
    <filter id="doc-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <circle cx="240" cy="180" r="150" fill="#c9a84c" opacity="0.15" filter="url(#doc-glow)" />

  <g filter="url(#doc-shadow)">
    <rect x="60" y="40" width="360" height="280" rx="20" fill="#ffffff" />
  </g>

  <rect x="100" y="76" width="280" height="204" rx="10" fill="#f8fafc" stroke="#e2e8f0" />

  <rect x="120" y="94" width="140" height="14" rx="4" fill="#1e3a5f" />
  <rect x="290" y="92" width="28" height="18" rx="9" fill="#c9a84c" />
  <text x="304" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">FR</text>
  <rect x="322" y="92" width="28" height="18" rx="9" fill="#e2e8f0" />
  <text x="336" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">EN</text>

  <circle cx="132" cy="136" r="9" fill="#1e3a5f" />
  <text x="132" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
  <rect x="150" y="130" width="150" height="6" rx="3" fill="#0f172a" opacity="0.7" />
  <rect x="150" y="140" width="100" height="6" rx="3" fill="#94a3b8" opacity="0.5" />

  <circle cx="132" cy="168" r="9" fill="#1e3a5f" />
  <text x="132" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
  <rect x="150" y="162" width="150" height="6" rx="3" fill="#0f172a" opacity="0.7" />
  <rect x="150" y="172" width="100" height="6" rx="3" fill="#94a3b8" opacity="0.5" />

  <circle cx="132" cy="200" r="9" fill="#1e3a5f" />
  <text x="132" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
  <rect x="150" y="194" width="150" height="6" rx="3" fill="#0f172a" opacity="0.7" />
  <rect x="150" y="204" width="100" height="6" rx="3" fill="#94a3b8" opacity="0.5" />

  <circle cx="132" cy="232" r="9" fill="#1e3a5f" />
  <text x="132" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">4</text>
  <rect x="150" y="226" width="150" height="6" rx="3" fill="#0f172a" opacity="0.7" />
  <rect x="150" y="236" width="100" height="6" rx="3" fill="#94a3b8" opacity="0.5" />
</svg>
