<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="secu-illus-title secu-illus-desc">
  <title id="secu-illus-title">Fenêtre de navigateur protégée par un bouclier et un cadenas</title>
  <desc id="secu-illus-desc">Une fenêtre de navigateur avec sa barre d'adresse, superposée d'un badge en forme de bouclier contenant un cadenas, représentant la sécurisation d'un site internet.</desc>
  <defs>
    <filter id="secu-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1830" flood-opacity="0.35" />
    </filter>
    <filter id="secu-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <circle cx="240" cy="100" r="110" fill="#c9a84c" opacity="0.15" filter="url(#secu-glow)" />

  <g filter="url(#secu-shadow)">
    <rect x="40" y="20" width="400" height="160" rx="16" fill="#ffffff" />
  </g>

  <clipPath id="secu-browser-clip">
    <rect x="119" y="50" width="220" height="110" rx="10" />
  </clipPath>
  <g clip-path="url(#secu-browser-clip)">
    <rect x="119" y="50" width="220" height="110" fill="#ffffff" />
    <rect x="119" y="50" width="220" height="24" fill="#f1f5f9" />
    <circle cx="133" cy="62" r="3" fill="#cbd5e1" />
    <circle cx="147" cy="62" r="3" fill="#cbd5e1" />
    <circle cx="161" cy="62" r="3" fill="#cbd5e1" />
    <rect x="173" y="56" width="140" height="12" rx="6" fill="#ffffff" stroke="#e2e8f0" />
    <circle cx="181" cy="62" r="2" fill="#c9a84c" />
    <rect x="133" y="90" width="150" height="8" rx="4" fill="#94a3b8" opacity="0.4" />
    <rect x="133" y="106" width="110" height="8" rx="4" fill="#94a3b8" opacity="0.3" />
    <rect x="133" y="122" width="130" height="8" rx="4" fill="#94a3b8" opacity="0.3" />
    <rect x="133" y="138" width="90" height="8" rx="4" fill="#94a3b8" opacity="0.3" />
  </g>
  <rect x="119" y="50" width="220" height="110" rx="10" fill="none" stroke="#e2e8f0" />

  <path d="M329,87 L361,99 L361,127 C361,149 345,163 329,171 C313,163 297,149 297,127 L297,99 Z" fill="#c9a84c" stroke="#ffffff" stroke-width="3" />
  <path d="M322,129 v-9 a7,7 0 0 1 14,0 v9" fill="none" stroke="#ffffff" stroke-width="3.2" />
  <rect x="318" y="129" width="22" height="18" rx="3" fill="#ffffff" />
  <circle cx="329" cy="137" r="2" fill="#c9a84c" />
</svg>
