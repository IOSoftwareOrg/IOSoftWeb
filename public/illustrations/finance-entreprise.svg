<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fin-illus-title fin-illus-desc" font-family="system-ui, sans-serif">
  <title id="fin-illus-title">Diagnostic financier avec indicateur de rentabilité</title>
  <desc id="fin-illus-desc">Un panneau d'indicateur de rentabilité en hausse au-dessus d'un graphique en barres représentant plusieurs exercices comptables, le dernier exercice étant mis en évidence en or.</desc>
  <defs>
    <filter id="fin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0a1830" flood-opacity="0.4" />
    </filter>
    <filter id="fin-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <circle cx="240" cy="180" r="150" fill="#c9a84c" opacity="0.15" filter="url(#fin-glow)" />

  <g filter="url(#fin-shadow)">
    <rect x="60" y="40" width="360" height="280" rx="20" fill="#ffffff" />
  </g>

  <rect x="90" y="76" width="290" height="68" rx="12" fill="#f8fafc" stroke="#e2e8f0" />
  <circle cx="132" cy="110" r="22" fill="#c9a84c" />
  <path d="M132,99 L141,114 L135.5,114 L135.5,122 L128.5,122 L128.5,114 L123,114 Z" fill="#ffffff" />
  <rect x="168" y="94" width="90" height="8" rx="4" fill="#94a3b8" opacity="0.5" />
  <rect x="168" y="110" width="130" height="18" rx="6" fill="#1e3a5f" />

  <circle cx="345" cy="110" r="16" fill="none" stroke="#c9a84c" stroke-width="2" />
  <text x="345" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#c9a84c">€</text>

  <line x1="100" y1="260" x2="370" y2="260" stroke="#e2e8f0" stroke-width="1.5" />
  <rect x="110" y="220" width="34" height="40" rx="3" fill="#94a3b8" opacity="0.4" />
  <rect x="160" y="205" width="34" height="55" rx="3" fill="#94a3b8" opacity="0.4" />
  <rect x="210" y="190" width="34" height="70" rx="3" fill="#94a3b8" opacity="0.4" />
  <rect x="260" y="200" width="34" height="60" rx="3" fill="#94a3b8" opacity="0.4" />
  <rect x="310" y="165" width="34" height="95" rx="3" fill="#c9a84c" />
</svg>
