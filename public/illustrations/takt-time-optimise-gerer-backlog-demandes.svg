<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="takt-illus-title takt-illus-desc">
  <title id="takt-illus-title">Chronomètre au-dessus d'une file de tickets</title>
  <desc id="takt-illus-desc">Un chronomètre surplombant une file de six tickets alignés sur une ligne de traitement, le dernier ticket étant mis en évidence en or, représentant le Takt Time d'un service support.</desc>
  <defs>
    <filter id="takt-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1830" flood-opacity="0.35" />
    </filter>
    <filter id="takt-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <circle cx="240" cy="100" r="110" fill="#c9a84c" opacity="0.15" filter="url(#takt-glow)" />

  <g filter="url(#takt-shadow)">
    <rect x="40" y="20" width="400" height="160" rx="16" fill="#ffffff" />
  </g>

  <line x1="70" y1="140" x2="410" y2="140" stroke="#e2e8f0" stroke-width="3" />

  <rect x="90" y="120" width="36" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="98" y="132" width="20" height="4" rx="2" fill="#94a3b8" opacity="0.5" />
  <rect x="150" y="120" width="36" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="158" y="132" width="20" height="4" rx="2" fill="#94a3b8" opacity="0.5" />
  <rect x="210" y="120" width="36" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="218" y="132" width="20" height="4" rx="2" fill="#94a3b8" opacity="0.5" />
  <rect x="270" y="120" width="36" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="278" y="132" width="20" height="4" rx="2" fill="#94a3b8" opacity="0.5" />
  <rect x="330" y="120" width="36" height="40" rx="4" fill="#c9a84c" />
  <rect x="338" y="132" width="20" height="4" rx="2" fill="#ffffff" opacity="0.7" />

  <circle cx="240" cy="60" r="26" fill="#ffffff" stroke="#1e3a5f" stroke-width="3" />
  <rect x="236" y="28" width="8" height="8" rx="2" fill="#1e3a5f" />
  <line x1="240" y1="60" x2="240" y2="46" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round" />
  <line x1="240" y1="60" x2="251" y2="66" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="240" cy="60" r="3" fill="#c9a84c" />
</svg>
