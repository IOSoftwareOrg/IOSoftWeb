<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="techno-illus-title techno-illus-desc">
  <title id="techno-illus-title">Pyramide hiérarchique à trois niveaux d'experts</title>
  <desc id="techno-illus-desc">Une pyramide à trois niveaux, chacun marqué d'une icône d'engrenage représentant des experts, le niveau supérieur étant mis en évidence en or, symbolisant le pouvoir de la technostructure dans l'organisation.</desc>
  <defs>
    <filter id="techno-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1830" flood-opacity="0.35" />
    </filter>
    <filter id="techno-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <circle cx="240" cy="100" r="110" fill="#c9a84c" opacity="0.15" filter="url(#techno-glow)" />

  <g filter="url(#techno-shadow)">
    <rect x="40" y="20" width="400" height="160" rx="16" fill="#ffffff" />
  </g>

  <polygon points="163,125 317,125 338,165 142,165" fill="#64748b" opacity="0.18" />
  <polygon points="195,85 285,85 302,125 178,125" fill="#1e3a5f" />
  <polygon points="220,50 260,50 272,85 208,85" fill="#c9a84c" />

  <circle cx="200" cy="145" r="5" fill="#1e3a5f" opacity="0.5" />
  <circle cx="280" cy="145" r="5" fill="#1e3a5f" opacity="0.5" />

  <circle cx="240" cy="145" r="8" fill="none" stroke="#1e3a5f" stroke-width="2.5" />
  <circle cx="240" cy="145" r="2" fill="#1e3a5f" />
  <line x1="240" y1="137" x2="240" y2="133" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" />
  <line x1="240" y1="153" x2="240" y2="157" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" />
  <line x1="232" y1="145" x2="228" y2="145" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" />
  <line x1="248" y1="145" x2="252" y2="145" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" />

  <circle cx="240" cy="105" r="8" fill="none" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="240" cy="105" r="2" fill="#ffffff" />
  <line x1="240" y1="97" x2="240" y2="93" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="240" y1="113" x2="240" y2="117" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="232" y1="105" x2="228" y2="105" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="248" y1="105" x2="252" y2="105" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

  <circle cx="240" cy="67" r="8" fill="none" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="240" cy="67" r="2" fill="#ffffff" />
  <line x1="240" y1="59" x2="240" y2="55" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="240" y1="75" x2="240" y2="79" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="232" y1="67" x2="228" y2="67" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="248" y1="67" x2="252" y2="67" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
</svg>
