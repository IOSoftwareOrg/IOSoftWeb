<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="levier-illus-title levier-illus-desc">
  <title id="levier-illus-title">Levier financier amplifiant un rendement</title>
  <desc id="levier-illus-desc">Un levier en équilibre sur un point d'appui, la dette représentée par un petit poids d'un côté, et une flèche ascendante amplifiée de l'autre côté, symbolisant l'effet de levier financier.</desc>
  <defs>
    <filter id="levier-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1830" flood-opacity="0.35" />
    </filter>
    <filter id="levier-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <circle cx="240" cy="100" r="110" fill="#c9a84c" opacity="0.15" filter="url(#levier-glow)" />

  <g filter="url(#levier-shadow)">
    <rect x="40" y="20" width="400" height="160" rx="16" fill="#ffffff" />
  </g>

  <path d="M225.5,145 L259.5,145 L242.5,113 Z" fill="#1e3a5f" />
  <line x1="137.5" y1="125" x2="347.5" y2="95" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" />

  <circle cx="137.5" cy="125" r="15" fill="#1e3a5f" />
  <line x1="131.5" y1="125" x2="143.5" y2="125" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />

  <line x1="347.5" y1="95" x2="347.5" y2="58" stroke="#c9a84c" stroke-width="4" stroke-linecap="round" />
  <path d="M347.5,50 L337.5,64 L357.5,64 Z" fill="#c9a84c" />
</svg>
