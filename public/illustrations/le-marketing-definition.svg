<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mktg-illus-title mktg-illus-desc">
  <title id="mktg-illus-title">Mégaphone diffusant un message vers une cible</title>
  <desc id="mktg-illus-desc">Un mégaphone stylisé à gauche émettant des ondes sonores vers une cible concentrique à droite, représentant la diffusion d'un message marketing vers son public.</desc>
  <defs>
    <filter id="mktg-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1830" flood-opacity="0.35" />
    </filter>
    <filter id="mktg-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <circle cx="240" cy="100" r="110" fill="#c9a84c" opacity="0.15" filter="url(#mktg-glow)" />

  <g filter="url(#mktg-shadow)">
    <rect x="40" y="20" width="400" height="160" rx="16" fill="#ffffff" />
  </g>

  <polygon points="103.5,85 158.5,65 158.5,135 103.5,115" fill="#1e3a5f" />
  <rect x="91.5" y="90" width="16" height="20" rx="4" fill="#1e3a5f" />
  <path d="M170.5,80 A25,25 0 0 1 170.5,120" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M185.5,70 A38,38 0 0 1 185.5,130" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6" />

  <circle cx="343.5" cy="100" r="45" fill="none" stroke="#c9a84c" stroke-width="8" opacity="0.3" />
  <circle cx="343.5" cy="100" r="30" fill="none" stroke="#c9a84c" stroke-width="8" opacity="0.5" />
  <circle cx="343.5" cy="100" r="14" fill="#c9a84c" />
</svg>
