<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pm-illus-title pm-illus-desc">
  <title id="pm-illus-title">Flowchart de processus avec goulot d'étranglement identifié</title>
  <desc id="pm-illus-desc">Un flowchart de processus métier avec deux chemins parallèles qui se rejoignent, dont l'un est mis en évidence en or avec une icône d'horloge, représentant un goulot d'étranglement détecté.</desc>
  <defs>
    <filter id="pm-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0a1830" flood-opacity="0.4" />
    </filter>
    <filter id="pm-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
    <marker id="pm-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#94a3b8" />
    </marker>
  </defs>

  <circle cx="240" cy="180" r="150" fill="#c9a84c" opacity="0.15" filter="url(#pm-glow)" />

  <g filter="url(#pm-shadow)">
    <rect x="60" y="40" width="360" height="280" rx="20" fill="#ffffff" />
  </g>

  <line x1="150" y1="164" x2="182" y2="126" stroke="#94a3b8" stroke-width="2" marker-end="url(#pm-arrow)" />
  <line x1="150" y1="186" x2="182" y2="224" stroke="#94a3b8" stroke-width="2" marker-end="url(#pm-arrow)" />
  <line x1="245" y1="120" x2="277" y2="163" stroke="#94a3b8" stroke-width="2" marker-end="url(#pm-arrow)" />
  <line x1="245" y1="230" x2="277" y2="187" stroke="#94a3b8" stroke-width="2" marker-end="url(#pm-arrow)" />

  <rect x="90" y="155" width="60" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="102" y="170" width="36" height="6" rx="3" fill="#64748b" opacity="0.5" />
  <rect x="102" y="180" width="24" height="6" rx="3" fill="#64748b" opacity="0.3" />

  <rect x="185" y="100" width="60" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="197" y="112" width="36" height="6" rx="3" fill="#64748b" opacity="0.5" />
  <rect x="197" y="122" width="24" height="6" rx="3" fill="#64748b" opacity="0.3" />

  <rect x="185" y="210" width="60" height="40" rx="8" fill="#c9a84c" />
  <circle cx="215" cy="222" r="8" fill="none" stroke="#ffffff" stroke-width="1.8" />
  <line x1="215" y1="222" x2="215" y2="217" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" />
  <line x1="215" y1="222" x2="219" y2="224" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" />

  <rect x="280" y="155" width="60" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" />
  <rect x="292" y="167" width="36" height="6" rx="3" fill="#64748b" opacity="0.5" />
  <rect x="292" y="177" width="24" height="6" rx="3" fill="#64748b" opacity="0.3" />
</svg>
