<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="iamgmt-illus-title iamgmt-illus-desc">
  <title id="iamgmt-illus-title">Organigramme avec un nœud d'intelligence artificielle au sommet</title>
  <desc id="iamgmt-illus-desc">Un organigramme dont le nœud sommital, représenté par une étincelle, est relié à trois membres de l'équipe, symbolisant l'IA qui redistribue les décisions dans l'organisation.</desc>
